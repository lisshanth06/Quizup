{% extends "base_user.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="not-allowed-page">
    <div class="not-allowed-content">
        <h2>Access Denied</h2>
        <p>The email <strong>{{ email }}</strong> is not authorized to participate in this quiz.</p>
        <a href="{% url 'accounts:send_otp' quiz_id=quiz.id %}" class="btn btn-secondary">Go Back</a>
    </div>
</div>
{% endblock %}
