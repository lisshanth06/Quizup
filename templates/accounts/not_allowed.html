{% extends "base_user.html" %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="not-allowed-page">
    <div class="not-allowed-content">
        <h2>Access Denied</h2>
        <p><strong>{{ email }}</strong> is not registered for this quiz.</p>
        <p>Please check your email address or contact the organizer.</p>
        <a href="{% url 'accounts:login' quiz_id=quiz.id %}" class="btn btn-secondary">Try Again</a>
    </div>
</div>
{% endblock %}
