{% extends 'base_user.html' %}

{% block title %}Verify OTP - {{ quiz.name }}{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-form">
        <h2>Verify OTP</h2>
        <p class="info-text">A 6-digit code has been sent to <strong>{{ email }}</strong></p>

        <form method="post" class="form">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="name" value="{{ name }}">
            <div class="form-group">
                <label for="otp">OTP Code</label>
                <input type="text" id="otp" name="otp" required class="form-control otp-input" maxlength="6"
                    pattern="[0-9]{6}" placeholder="000000" autocomplete="off">
                <small class="form-text">Enter the 6-digit code from your email</small>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Verify</button>
        </form>

        <div class="form-footer">
            <a href="{% url 'accounts:send_otp' quiz.id %}" class="link">Resend OTP</a>
            <span class="separator">|</span>
            <a href="{% url 'core:landing' %}" class="link">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
