{% extends "base_user.html" %}

{% block title %}Quiz Completed{% endblock %}

{% block content %}
<div class="submitted-page">
    <div class="submitted-content">
        <h2>Quiz Completed</h2>
        <p class="submitted-message">
            You have successfully completed <strong>{{ quiz.name }}</strong>.<br>
            Your responses have been recorded.
        </p>

        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 24px;">
            {% if quiz.show_leaderboard %}
            <a href="{% url 'leaderboard:quiz_leaderboard' quiz.id %}" class="btn btn-primary">View Leaderboard</a>
            {% endif %}
            <a href="{% url 'core:landing' %}" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
