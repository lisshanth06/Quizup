{% extends 'base.html' %}

{% block navbar %}{% endblock %}

{% block content %}
<style>
.role-container {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.role-card {
  padding: 40px;
  border-radius: 16px;
  text-align: center;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  background: rgba(20, 20, 20, 0.4);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.role-card h1 {
  margin-bottom: 8px;
  font-size: 28px;
}

.role-card p {
  margin-bottom: 32px;
  color: #a0a0a0;
}

.role-options {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.role-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  background: #111;
  border: 1px solid #333;
}

.role-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}

.role-btn:hover::before {
  transform: translateX(100%);
}

/* ADMIN BUTTON (RED OUTLINE) */
.admin-btn {
  color: #EF4444;
  border-color: #EF4444;
}

.admin-btn:hover {
  color: #B91C1C;
  border-color: #B91C1C;
}

/* USER BUTTON (GREEN OUTLINE) */
.user-btn {
  color: #3ECF8E;
  border-color: #3ECF8E;
}

.user-btn:hover {
  color: #2EB67D;
  border-color: #2EB67D;
}
</style>

<div class="container role-container">

  <div class="card role-card">

    <h1>Select Access</h1>
    <p>Choose how you want to continue</p>

    <div class="role-options">

      <!-- ADMIN -->
      <a href="{% url 'dashboard:login' %}" class="role-btn admin-btn">
        Login as Admin
      </a>

      <!-- USER -->
      <a href="{% url 'core:landing' %}" class="role-btn user-btn">
        Continue as User
      </a>

    </div>

  </div>

</div>
{% endblock %}
